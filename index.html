<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You 💕</title>

    <!-- Custom Styles ff-->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff6b9d"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 1 1, auto;
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .main-text {
            font-size: 4.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff, #ffb6d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: fadeInScale 1s ease-out, float 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
            letter-spacing: 3px;
            filter: drop-shadow(0 0 20px rgba(255, 107, 157, 0.4));
        }

        .heart {
            display: inline-block;
            font-size: 4rem;
            animation: heartBeat 0.6s ease-out infinite, glow 2s ease-in-out infinite;
            margin: 0 20px;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .heart:hover {
            transform: scale(1.2);
        }

        .heart:active {
            animation: explode 0.6s ease-out;
        }

        .sub-text {
            font-size: 1.8rem;
            color: #ffffff;
            animation: fadeInUp 1.2s ease-out 0.3s backwards;
            margin-top: 30px;
            opacity: 0.95;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .extra-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            animation: fadeInUp 1.2s ease-out 0.5s backwards;
            margin-top: 15px;
            font-style: italic;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .button-group {
            margin-top: 50px;
            animation: fadeInUp 1.2s ease-out 0.6s backwards;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 35px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.3s ease;
            z-index: -1;
        }

        button:hover::before {
            left: 100%;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.5);
        }

        .btn-yes:hover {
            transform: translate(0, -5px);
            box-shadow: 0 12px 35px rgba(255, 107, 157, 0.7);
        }

        .btn-yes:active {
            transform: translate(0, -2px);
        }

        .btn-maybe {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .btn-maybe:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translate(0, -5px);
            border-color: white;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3);
        }

        .btn-maybe:active {
            transform: translate(0, -2px);
        }

        /* Floating stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        /* Floating hearts background */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .float-heart {
            position: absolute;
            font-size: 2rem;
            animation: floatUp 4s ease-in infinite;
            opacity: 0.7;
            filter: drop-shadow(0 0 8px rgba(255, 107, 157, 0.6));
            cursor: pointer;
        }

        .float-heart:hover {
            filter: drop-shadow(0 0 15px rgba(255, 107, 157, 1));
            transform: scale(1.2);
        }

        /* Flying text background */
        .flying-text-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .flying-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.6);
            animation: flyAcross linear infinite;
        }

        /* Animations */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(1);
            }
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(255, 107, 157, 0.6));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(255, 107, 157, 1));
            }
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes floatUp {
            0% {
                bottom: -50px;
                opacity: 0.6;
            }
            100% {
                bottom: 100vh;
                opacity: 0;
                transform: translateX(30px) rotate(360deg);
            }
        }

        @keyframes flyAcross {
            0% {
                left: -400px;
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                left: 100vw;
                opacity: 0;
            }
        }

        .success-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            background: linear-gradient(135deg, #ff6b9d 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 100;
            text-shadow: 0 0 40px rgba(255, 107, 157, 0.8);
            animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 0 30px rgba(255, 107, 157, 0.6));
            font-weight: 900;
            text-align: center;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .main-text {
                font-size: 3rem;
            }

            .heart {
                font-size: 2.5rem;
                margin: 0 8px;
            }

            .sub-text {
                font-size: 1.2rem;
            }

            .extra-text {
                font-size: 1rem;
            }

            button {
                padding: 12px 25px;
                font-size: 0.9rem;
                margin: 5px;
            }

            .button-group {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Stars background -->
    <div class="stars" id="starContainer"></div>

    <!-- Floating hearts background -->
    <div class="floating-hearts" id="heartContainer"></div>

    <!-- Flying text background -->
    <div class="flying-text-container" id="flyingTextContainer"></div>

    <!-- Main content -->
    <div class="container">
        <div class="main-text">
            I <span class="heart" id="heartElement">❤️</span> YOU
        </div>
        
        
        <div class="button-group">
           
            <button class="btn-maybe" onclick="showMessages()">Show me more ✨</button>
        </div>
    </div>

    <div class="success-message" id="successMessage">
        💕 FOREVER 💕
    </div>
<!-- test app--> 
    <script>
        // Generate random stars
        function generateStars() {
            const starContainer = document.getElementById('starContainer');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starContainer.appendChild(star);
            }
        }

        // Generate floating hearts
        function generateFloatingHearts() {
            const heartContainer = document.getElementById('heartContainer');
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'float-heart';
                heart.textContent = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (3 + Math.random() * 3) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heartContainer.appendChild(heart);
            }
        }

        // Generate flying text
        function generateFlyingText() {
            const flyingTextContainer = document.getElementById('flyingTextContainer');
            const messages = ['💕 I LOVE YOU 💕', '✨ You Are Amazing ✨', '💖 Forever Yours 💖', '🌟 My Heart Is Yours 🌟'];
            for (let i = 0; i < 35; i++) {
                const text = document.createElement('div');
                text.className = 'flying-text';
                text.textContent = messages[Math.floor(Math.random() * messages.length)];
                text.style.top = Math.random() * 100 + '%';
                const duration = 6 + Math.random() * 6;
                text.style.animationDuration = duration + 's';
                text.style.animationDelay = Math.random() * 12 + 's';
                text.style.fontSize = (1.2 + Math.random() * 1.3) + 'rem';
                text.style.color = `rgba(255, ${107 + Math.random() * 50}, ${157 + Math.random() * 50}, ${0.6 + Math.random() * 0.4})`;
                flyingTextContainer.appendChild(text);
            }
        }

        // Celebrate function
        function celebrate() {
            const successMessage = document.getElementById('successMessage');
            successMessage.style.display = 'block';
            
            // Create confetti effect
            createConfetti();
            
            // Hide message after 3 seconds
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }

        // Hide buttons and show more hearts
        function hideButtons() {
            const buttonGroup = document.querySelector('.button-group');
            buttonGroup.style.display = 'none';
            
            // Add more floating hearts
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.className = 'float-heart';
                heart.textContent = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = '0';
                heart.style.animationDuration = (3 + Math.random() * 3) + 's';
                heart.style.animationDelay = Math.random() * 1 + 's';
                document.getElementById('heartContainer').appendChild(heart);
            }
        }

        // Show special messages
        function showMessages() {
            const messages = [
                '💝 You make me smile every day',
                '✨ I can\'t imagine life without you',
                '🌹 You\'re my forever person',
                '💫 My love for you grows stronger',
                '🎆 You light up my world'
            ];
            
            const msgDiv = document.createElement('div');
            msgDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 2rem;
                color: #fff;
                z-index: 100;
                text-align: center;
                text-shadow: 0 0 20px rgba(255, 107, 157, 0.8);
                animation: popIn 0.8s ease-out;
                backdrop-filter: blur(10px);
                padding: 30px;
                border-radius: 20px;
                background: rgba(0, 0, 0, 0.2);
            `;
            msgDiv.textContent = messages[Math.floor(Math.random() * messages.length)];
            document.body.appendChild(msgDiv);
            
            setTimeout(() => {
                msgDiv.style.opacity = '0';
                msgDiv.style.transition = 'opacity 0.8s ease-out';
                setTimeout(() => msgDiv.remove(), 800);
            }, 2500);
            
            createConfetti();
        }

        // Create confetti effect
        function createConfetti() {
            const colors = ['❤️', '💕', '💖', '💗', '💓', '💘', '💞'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.fontSize = (1.5 + Math.random() * 1.5) + 'rem';
                confetti.style.pointerEvents = 'none';
                confetti.textContent = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `floatUp ${3 + Math.random() * 2}s ease-in forwards`;
                confetti.style.zIndex = '99';
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // Interactive heart clicking
        const heartElement = document.getElementById('heartElement');
        if (heartElement) {
            heartElement.addEventListener('click', function() {
                createHeartTrail(event.clientX, event.clientY);
                createConfetti();
            });
        }

        // Create heart trail on click
        function createHeartTrail(x, y) {
            const hearts = ['❤️', '💕', '💖'];
            for (let i = 0; i < 8; i++) {
                const heart = document.createElement('div');
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.position = 'fixed';
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                heart.style.fontSize = '1.5rem';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '98';
                heart.style.animation = `floatUp ${2 + Math.random()}s ease-out forwards`;
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 2500);
            }
        }
    

        // Mouse trail effect
        document.addEventListener('mousemove', function(e) {
            if (Math.random() > 0.97) {
                const sparkle = document.createElement('div');
                sparkle.style.position = 'fixed';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                sparkle.style.width = '6px';
                sparkle.style.height = '6px';
                sparkle.style.borderRadius = '50%';
                sparkle.style.background = 'radial-gradient(circle, rgba(255,255,255,1), rgba(255,107,157,1))';
                sparkle.style.pointerEvents = 'none';
                sparkle.style.boxShadow = '0 0 10px rgba(255, 107, 157, 0.8)';
                sparkle.style.animation = `fadeInUp 0.8s ease-out forwards`;
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 800);
            }
        });

        // Initialize
        generateStars();
        generateFloatingHearts();
        generateFlyingText();
    </script>
</body>
</html>
