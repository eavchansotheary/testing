<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💕</title>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #ffe1e1 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --accent-pink: #ff758f;
            --text-dark: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            color: var(--text-dark);
        }

        .bg-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 3.5rem 2rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
            text-align: center;
            z-index: 10;
            max-width: 400px;
            width: 90%;
            animation: cardAppear 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .float-item {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            white-space: nowrap;
            font-weight: 700;
            color: var(--accent-pink);
            /* Slightly lower opacity for "clean" look despite high volume */
            opacity: 0.25; 
            animation: floatAway linear forwards;
            filter: blur(0.5px);
        }

        .main-sentence {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1.5px;
            animation: hoverAnim 4s ease-in-out infinite;
        }

        .sub-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            font-weight: 500;
        }

        @keyframes floatAway {
            0% {
                transform: translateY(115vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            15% { opacity: 0.3; }
            50% { transform: translateY(50vh) translateX(40px) rotate(5deg); }
            85% { opacity: 0.3; }
            100% {
                transform: translateY(-15vh) translateX(-40px) rotate(-5deg);
                opacity: 0;
            }
        }

        @keyframes hoverAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-elements" id="bg-elements"></div>

    <div class="card">
        <div class="main-sentence">I ❤️ YOU</div>
        <p class="sub-text">
            wo xihuan ni, wo ai ni, wo xiang ni, kon pov.
        </p>
    </div>

    <script>
        const container = document.getElementById('bg-elements');
        
        // Weighted array: More text, fewer icons for a "text heavy" background
        const items = [
            'I LOVE YOU', 'I LOVE YOU', 'I LOVE YOU', 
            'I LOVE YOU', 'I LOVE YOU', '❤️', '💖', '✨'
        ];

        function createFloatingElement() {
            const item = document.createElement('div');
            item.className = 'float-item';
            item.innerText = items[Math.floor(Math.random() * items.length)];
            
            // Random horizontal position
            item.style.left = Math.random() * 100 + 'vw';
            
            // Vary the size so some look further away (cleaner depth)
            const size = (Math.random() * 12 + 10); 
            item.style.fontSize = size + 'px';
            
            // Random speed for a natural "snowfall" but upwards
            const duration = Math.random() * 6 + 6; 
            item.style.animationDuration = duration + 's';
            
            // Slight random delay to prevent "clumping"
            item.style.animationDelay = Math.random() * 2 + 's';
            
            container.appendChild(item);
            
            setTimeout(() => {
                item.remove();
            }, (duration + 2) * 1000);
        }

        // INITIAL BURST: Fill the screen immediately when it opens
        for(let i = 0; i < 20; i++) {
            setTimeout(createFloatingElement, i * 150);
        }

        // CONTINUOUS GENERATION: Very fast spawn rate (300ms)
        setInterval(createFloatingElement, 100);
    </script>
</body>
</html>
